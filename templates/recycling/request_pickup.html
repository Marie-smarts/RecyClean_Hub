{% extends 'host/base.html' %}

{% block title %}Request Pickup - RecyCleanHub{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0"><i class="bi bi-truck"></i> Request pickup</h4>
                    {% if center %}<p class="small text-muted mb-0">{{ center.name }}</p>{% endif %}
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Scheduled date</label>
                            {{ form.scheduled_date }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Total weight (kg)</label>
                            {{ form.total_weight }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            {{ form.notes }}
                        </div>
                        <button type="submit" class="btn btn-role">Submit request</button>
                        <a href="{% url 'host_dashboard' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
