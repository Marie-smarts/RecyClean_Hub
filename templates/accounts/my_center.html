{% extends 'base.html' %}
{% load static %}

{% block title %}My Center - EcoRecycle{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header text-center py-4">
                    <h2><i class="bi bi-shop"></i> My Drop-off Center</h2>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Center Name *</label>
                            {{ form.name }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Address *</label>
                            {{ form.address }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Phone *</label>
                            {{ form.phone }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Center Image</label>
                            {{ form.image }}
                        </div>
                        
                        <div class="mb-3">
                            <div class="form-check">
                                {{ form.is_active }}
                                <label class="form-check-label">Center is Active</label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-eco">Save Center</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
