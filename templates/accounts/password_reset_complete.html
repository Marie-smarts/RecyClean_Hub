{% extends 'base.html' %}
{% load static %}

{% block title %}Password updated - RecyCleanHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header text-center py-4">
                    <h2><i class="bi bi-check-circle"></i> Password updated</h2>
                    <p class="mb-0 text-white-50">Your password has been changed successfully</p>
                </div>
                <div class="card-body p-4 text-center">
                    <p class="mb-4">You can now sign in with your new password.</p>
                    <a href="{% url 'login' %}" class="btn btn-eco btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Go to login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
