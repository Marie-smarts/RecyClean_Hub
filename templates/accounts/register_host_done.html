{% extends 'base.html' %}

{% block title %}Host application submitted - RecyCleanHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg p-5">
                <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                <h2 class="mt-3">Thank you for registering as a Drop-off Host.</h2>
                <p class="text-muted">Your application is under review. You will receive an email once verified.</p>
                <a href="{% url 'login' %}" class="btn btn-eco mt-3">Go to login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
